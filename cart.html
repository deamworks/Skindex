<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cart — Skindex</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAzMiAzMiI+CiAgPHJlY3Qgd2lkdGg9IjMyIiBoZWlnaHQ9IjMyIiByeD0iOCIgZmlsbD0iI0U4NjA0QSIvPgogIDx0ZXh0IHg9IjE2IiB5PSIyMyIgZm9udC1mYW1pbHk9Ikdlb3JnaWEsc2VyaWYiIGZvbnQtc2l6ZT0iMjIiIGZvbnQtd2VpZ2h0PSI3MDAiCiAgICB0ZXh0LWFuY2hvcj0ibWlkZGxlIiBmaWxsPSJ3aGl0ZSI+UzwvdGV4dD4KPC9zdmc+">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500;600&display=swap">
<link rel="stylesheet" href="shared.css">
<style>
.cart-wrap{max-width:1100px;margin:0 auto;padding:3rem 3rem 5rem}
.cart-wrap h1{font-family:'Playfair Display',serif;font-size:2rem;font-weight:700;color:var(--dark);margin-bottom:.25rem}
.cart-wrap .subtitle{font-size:.85rem;color:var(--muted);margin-bottom:2.5rem}

.cart-layout{display:grid;grid-template-columns:1fr 360px;gap:3rem;align-items:start}

/* ── ITEM LIST ── */
.cart-items{border-top:1px solid rgba(0,0,0,.08)}
.cart-item{display:grid;grid-template-columns:88px 1fr auto;gap:1.5rem;align-items:center;padding:1.5rem 0;border-bottom:1px solid rgba(0,0,0,.06)}
.cart-img{width:88px;height:88px;border-radius:var(--r);display:flex;align-items:center;justify-content:center;font-size:2.8rem;flex-shrink:0}

.cart-item-name{font-weight:600;font-size:.95rem;color:var(--dark);margin-bottom:.2rem}
.cart-item-meta{font-size:.78rem;color:var(--muted);margin-bottom:.75rem}
.cart-controls{display:flex;align-items:center;gap:.75rem}
.qty-ctrl{display:flex;align-items:center;border:1.5px solid #DDD;border-radius:8px;overflow:hidden}
.qty-ctrl button{width:32px;height:32px;background:none;border:none;cursor:pointer;font-size:1rem;transition:background .15s;color:var(--dark)}
.qty-ctrl button:hover{background:var(--light)}
.qty-ctrl span{font-size:.85rem;font-weight:600;min-width:28px;text-align:center}
.btn-remove{background:none;border:none;font-size:.78rem;color:#BBB;cursor:pointer;transition:color .2s;letter-spacing:.03em}
.btn-remove:hover{color:var(--coral)}
.cart-item-price{text-align:right}
.item-price-val{font-size:1rem;font-weight:700;color:var(--dark)}
.item-price-unit{font-size:.75rem;color:var(--muted);margin-top:.15rem}

/* empty state */
.empty-cart{text-align:center;padding:5rem 2rem}
.empty-icon{font-size:4rem;margin-bottom:1.5rem}
.empty-cart h2{font-family:'Playfair Display',serif;font-size:1.6rem;color:var(--dark);margin-bottom:.5rem}
.empty-cart p{font-size:.88rem;color:var(--muted);margin-bottom:2rem}

/* ── ORDER SUMMARY ── */
.order-summary{background:var(--warm);border-radius:var(--r-lg);padding:2rem;position:sticky;top:90px}
.os-title{font-family:'Playfair Display',serif;font-size:1.25rem;font-weight:600;color:var(--dark);margin-bottom:1.5rem}
.coupon-row{display:flex;gap:.5rem;margin-bottom:1.5rem}
.coupon-input{
  flex:1;border:1.5px solid #DDD;border-radius:8px;
  padding:.55rem .9rem;font-family:'DM Sans',sans-serif;
  font-size:.83rem;outline:none;color:var(--dark);
}
.coupon-input:focus{border-color:var(--coral)}
.btn-apply{
  background:var(--dark);color:white;border:none;border-radius:8px;
  padding:.55rem 1.1rem;font-size:.78rem;font-weight:600;
  letter-spacing:.05em;text-transform:uppercase;cursor:pointer;
  white-space:nowrap;transition:background .2s;font-family:'DM Sans',sans-serif;
}
.btn-apply:hover{background:var(--coral)}
.coupon-msg{font-size:.75rem;margin-top:.4rem;height:1rem}
.coupon-msg.ok{color:#4CAF90}
.coupon-msg.err{color:var(--coral)}
.summary-row{display:flex;justify-content:space-between;font-size:.88rem;margin-bottom:.6rem;color:var(--text)}
.summary-row.discount{color:var(--coral)}
.summary-row.total{font-size:1.05rem;font-weight:700;color:var(--dark);padding-top:.75rem;margin-top:.5rem;border-top:1px solid rgba(0,0,0,.08)}
.btn-checkout{
  width:100%;margin-top:1.5rem;padding:1rem;
  background:var(--coral);color:white;border:none;border-radius:var(--r);
  font-family:'DM Sans',sans-serif;font-size:.88rem;font-weight:700;
  letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:background .2s;
}
.btn-checkout:hover{background:#d4503a}
.btn-back{
  width:100%;margin-top:.75rem;padding:.75rem;
  border:1.5px solid #DDD;border-radius:var(--r);background:none;
  font-family:'DM Sans',sans-serif;font-size:.82rem;color:var(--muted);
  cursor:pointer;transition:all .2s;letter-spacing:.05em;
}
.btn-back:hover{border-color:var(--dark);color:var(--dark)}
.secure-row{text-align:center;font-size:.72rem;color:var(--muted);margin-top:.75rem}

/* upsell */
.upsell{margin-top:2rem;border-top:1px solid rgba(0,0,0,.08);padding-top:1.5rem}
.upsell-title{font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:1rem}
.upsell-grid{display:grid;grid-template-columns:1fr 1fr;gap:.75rem}
.upsell-card{background:white;border-radius:var(--r);padding:.75rem;cursor:pointer;transition:box-shadow .2s;border:1px solid transparent}
.upsell-card:hover{box-shadow:0 4px 12px rgba(0,0,0,.08);border-color:var(--lavender-mid)}
.upsell-img{font-size:1.8rem;margin-bottom:.4rem}
.upsell-name{font-size:.72rem;font-weight:600;color:var(--dark);margin-bottom:.2rem}
.upsell-price{font-size:.75rem;color:var(--coral);font-weight:700}

@media(max-width:900px){
  .cart-wrap{padding:2rem 1.5rem}
  .cart-layout{grid-template-columns:1fr}
  .order-summary{position:static}
}
</style>
</head>
<body>
<script>window.SKINDEX_PAGE='cart';</script>

<div class="cart-wrap">
  <h1>Your Bag</h1>
  <p class="subtitle" id="cartSubtitle">Loading…</p>

  <div id="cartContent"></div>
</div>

<script src="store.js"></script>
<script src="nav.js"></script>
<script>
  let discount = 0;

  function renderCart(){
    const cart = Cart.get();
    const container = document.getElementById('cartContent');
    document.getElementById('cartSubtitle').textContent =
      cart.length ? cart.reduce((s,i)=>s+i.qty,0)+' item'+(cart.reduce((s,i)=>s+i.qty,0)!==1?'s':'') + ' in your bag'
                  : 'Your bag is empty';

    if(!cart.length){
      container.innerHTML = `
        <div class="empty-cart">
          <div class="empty-icon">🛍️</div>
          <h2>Your bag is empty</h2>
          <p>Add some beautiful things to get started.</p>
          <a href="shop.html"><button class="btn-coral">Continue Shopping →</button></a>
        </div>`;
      return;
    }

    const sub = Cart.total();
    const total = Math.max(0, sub - discount);

    // upsell: products not in cart
    const cartIds = new Set(cart.map(i=>i.id));
    const upsells = SKINDEX_PRODUCTS.filter(p=>!cartIds.has(p.id)).slice(0,4);

    container.innerHTML = `
      <div class="cart-layout">
        <div>
          <div class="cart-items">
            ${cart.map(item=>`
              <div class="cart-item" id="ci-${item.key}">
                <div class="cart-img ${item.imgClass}">${item.icon}</div>
                <div class="cart-info">
                  <div class="cart-item-name">${item.name}</div>
                  <div class="cart-item-meta">Skindex · ${item.shade}</div>
                  <div class="cart-controls">
                    <div class="qty-ctrl">
                      <button onclick="updateQty('${item.key}',${item.qty-1})">−</button>
                      <span>${item.qty}</span>
                      <button onclick="updateQty('${item.key}',${item.qty+1})">+</button>
                    </div>
                    <button class="btn-remove" onclick="removeItem('${item.key}')">Remove</button>
                  </div>
                </div>
                <div class="cart-item-price">
                  <div class="item-price-val">$${(item.price*item.qty).toFixed(2)}</div>
                  <div class="item-price-unit">$${item.price.toFixed(2)} each</div>
                </div>
              </div>
            `).join('')}
          </div>
        </div>

        <div class="order-summary">
          <div class="os-title">Order Summary</div>
          <div class="coupon-row">
            <input class="coupon-input" id="couponInput" placeholder="Coupon code" onkeydown="if(event.key==='Enter')applyCoupon()">
            <button class="btn-apply" onclick="applyCoupon()">Apply</button>
          </div>
          <div class="coupon-msg" id="couponMsg"></div>
          <div class="summary-row"><span>Subtotal (${cart.reduce((s,i)=>s+i.qty,0)} items)</span><span>$${sub.toFixed(2)}</span></div>
          <div class="summary-row"><span>Shipping</span><span style="color:#4CAF90">${sub>=500?'Free':'$9.90'}</span></div>
          ${discount>0?`<div class="summary-row discount"><span>Discount</span><span>−$${discount.toFixed(2)}</span></div>`:''}
          <div class="summary-row total"><span>Total</span><span>$${(total+(sub<500?9.90:0)).toFixed(2)}</span></div>
          <button class="btn-checkout" onclick="window.location='checkout.html'">Proceed to Checkout →</button>
          <button class="btn-back" onclick="window.location='shop.html'">← Continue Shopping</button>
          <div class="secure-row">🔒 Secure checkout · SSL encrypted</div>

          <div class="upsell">
            <div class="upsell-title">You might also like</div>
            <div class="upsell-grid">
              ${upsells.slice(0,4).map(p=>`
                <div class="upsell-card" onclick="window.location='product.html?id=${p.id}'">
                  <div class="upsell-img">${p.icon}</div>
                  <div class="upsell-name">${p.name}</div>
                  <div class="upsell-price">$${p.price.toFixed(2)}</div>
                </div>
              `).join('')}
            </div>
          </div>
        </div>
      </div>`;
  }

  function updateQty(key, qty){
    Cart.setQty(key, qty);
    renderCart();
  }
  function removeItem(key){
    Cart.remove(key);
    renderCart();
  }
  function applyCoupon(){
    const code = document.getElementById('couponInput').value.toUpperCase().trim();
    const msg  = document.getElementById('couponMsg');
    if(code==='GLOW20'){
      discount = Cart.total()*0.2;
      msg.className='coupon-msg ok';
      msg.textContent='✓ 20% discount applied!';
      renderCart();
    } else {
      msg.className='coupon-msg err';
      msg.textContent='Invalid coupon code.';
    }
  }

  window.addEventListener('storage', renderCart);
  renderCart();
</script>
</body>
</html>
